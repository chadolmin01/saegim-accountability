# 실제 설계내역서 대입 — "대형 토목 현장 설계 내역서.XLS" (OLE2 .xls, 8시트)
# 출처: C:\project\OpenCrab\대형 토목 현장 설계 내역서.XLS
# 도출 근거(추측 아님 / 내역서 저장값에서 직접 계산):
#   - 직접공사비 ≈ 249,949,727,666원 (리프 라인아이템 1,791개 합계금액 합산)
#   - 세부 소계: 터널공 1,764억 / 토공 245억 / 가시설공 121억 / 구조물공 103억 / 수자원공 103억 / 부대공 82억 / 주요자재비 387억
#   - 산업안전보건관리비 (재+직노)×2.66%, 환경보전비 직접공사비×0.9% — 내역서 요율항목에 명시
#   - 공종 키워드 출현: 굴착166·콘크리트130·터널129·철근125·가시설59·말뚝49·거푸집49·그라우팅39·발파15·동바리10·비계8·옹벽3
# 주의: 토목 인프라(터널/도로)라 건축법 전용 필드(floor_count·building_height·건축허가)는 미설정 → 엔진이 "대상아님" 판정.
project:
  name: 대형 토목 현장 (터널 포함, 설계내역서 기준)
  # ── 검증 가능한 값만 (내역서 저장값에서 직접) ──
  # 도급금액(간접비/일반관리비/이윤/부가세 포함)은 수식셀이라 못 읽음. 리프합산 직접공사비를 '하한'으로 사용.
  # 하한 2,499억이 이미 모든 임계값(품질계획 500억·안전보건체계 50억·휴게시설 20억·산안관리비 4천만)을 초과하므로 그 의무들은 '확정' 유효.
  total_contract_amount_krw: 249949727666    # 하한(≥). 실제 도급금액은 더 큼
  uses_temporary_structure: true             # 가시설공 12,147,816,006원 = 흙막이/동바리 가설구조물 (확정)
  # ── 복합현장 (정정) ── 내역서에 '2.건축공사 5,241,107,455원' 존재 → 건축물 부재 있음
  contains_building: true                    # 건축물 게이트 OPEN: 건축법 문서가 그 건축물 부재에 적용됨
  contains_civil_facility: true              # 토목시설 게이트 OPEN: 터널·도로 = 도시계획시설
  is_urban_planning_facility_project: true   # 도시·군계획시설사업 → 실시계획인가 대상 (국토계획법 §88)
  performs_road_work: true                   # 도로공사 수행 (포장·IC)
  is_in_use: false                           # 시공 중 (사용승인서 대상이지만 아직 미사용)
  # occupies_road / is_non_road_authority 는 미상 → 도로점용·비관리청공사 판정보류
  # 건축물의 floor_count·building_height_m·gross_floor_area_m2 는 내역서에 없음 → 건축법 문서는 판정보류
  # ── 의도적으로 비움 (내역서에 없음 → 추측 금지) → '판정보류 + 필요데이터' ──
  #   excavation_depth_m          : 굴착 깊이 — 설계도서 종/횡단면도
  #   site_area_m2                : 부지면적 — 설계도서 부지경계 (환경영향평가 판정)
  #   expected_waste_ton          : 폐기물량 — 폐기물처리계획/물량집계
  #   is_facility_grade_1_or_2    : 시특법 시설물 등급 — 1·2종 지정 여부
  #   has_fire_risk_work          : 터널 내 용접 등 화기작업 여부
  #   uses_fixed_lifting_equipment: 고정식 양중설비 사용 여부
  #   is_demolition               : 기존구조물철거 있으나 '건축물 해체'(건축물관리법) 해당 여부 모호 → 보류
  #   gross_floor_area_m2         : 토목엔 연면적 개념 없음 — 아래 '룰 모델링 한계' 참조

# 제출 문서: 빈 리스트로 두어 "이 현장에 어떤 문서가 법정 의무인가"를 전수 확인 (실제 제출 대장 입수 시 채움)
