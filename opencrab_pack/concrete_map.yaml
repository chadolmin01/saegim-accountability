# 콘크리트 vertical 태깅 (view layer — 구조는 기존 knowledge graph, 이건 projection 축)
# prior-art 정렬:
#   stage  = 공정흐름 (EN 13670 §8 / ACI 301 §5 / ACI 318 Ch.26 / KCS 14 20 10 §3 / BCOM process)
#   state  = fresh|hardened|na (KS F 시리즈 / EN 13670 §8.2 명시적 분류축)
#   cause  = Design|Material|Construction|Maintenance (ASCE GFI 2nd / ASTM E678 포렌식 4범주 → 책임주체 매핑)
#   mcp    = self(별표2 무료검증, saegim 자가판정) | external(MIDAS/QC verdict consume)
# cause→전형 책임주체: Design→설계자, Material→제조사/공급, Construction→시공자, Maintenance→유지관리자

stages_order: [배합설계, 자재반입, 타설조건, 검측선행, 양생존치, 굳은강도, 후속결정]

