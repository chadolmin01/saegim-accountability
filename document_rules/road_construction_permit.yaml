rule_id: road_construction_permit__dorc
title: 비도로관리청 도로공사 시행허가
dimension: 문서·보고
regime: 도로법
source_type: 법령   # regime 파생 정규화 (binding 강도; 1단계 불일치탐지용)
applies_to_facility_class: 토목시설
facility_subtype: 도로
authority: {law: 도로법, article: 제36조, related: 시행령 제38조, rule: "도로관리청이 아닌 자가 도로공사·도로의 유지관리를 하려면 도로관리청의 사전 허가. 대통령령으로 정하는 경미한 경우 예외", source: "국가법령정보센터+정부24 교차검증 2026-05"}
document: 도로공사시행허가서
required_when:
  all:
    - performs_road_work        # 도로공사 수행
    - is_non_road_authority     # 시행자가 도로관리청이 아님
submit_before: 도로공사 착수 전
submit_to: 도로관리청
evaluation:
  steps: ["비도로관리청이 도로공사 시행 시 허가 의무. submitted_documents 확인."]
  outputs: [compliant, violated, not_required]
  audit_significance: "비관리청 무단 도로공사는 도로법 위반. 시행 권한·안전 책임 귀속의 근거."
