# Reference Rule — 책임건설사업관리기술인 배치 기준 (감리, 공공 발주청)
# 검증: 건설기술진흥법 시행규칙 제35조. 총공사비 구간별 등급+CM경력.
# 적용대상: 공공 발주청 발주 건설공사 (감독권한대행 CM). 민간 건축허가공사는 건축법 공사감리.
# 산출 형태 = qualification (등급 floor + 경력).
rule_id: cm_engineer_in_charge__citp
title: 책임건설사업관리기술인 배치 기준
role: 책임건설사업관리기술인
regime: 건설기술진흥법
source_type: 법령   # regime 파생 정규화 (binding 강도; 1단계 불일치탐지용)
applies_to_facility_class: 전체   # 건축/토목 게이트
requirement_shape: qualification

authority:
  law: 건설기술진흥법 시행규칙
  article: 제35조제1항
  table: "별표 2 (건설사업관리기술인 배치기준 — 상주/기술지원 인원은 별표2, 본 rule 은 책임CM 등급·경력)"
  revision: "시행규칙 2024-08-01 (제1362호)"
  source: "lbox.kr 시행규칙 제35조 + 04noti 교차검증 (2026-05). 상주/기술지원 인원(별표2) pending."

grade_order: [초급, 중급, 고급, 특급]

parameters:
  - {key: total_contract_amount_krw, label: 총공사비(원), type: integer, required: true}
  - {key: is_public_client, label: 공공 발주청 여부, type: bool, default: true,
     note: 민간 건축허가공사면 건축법 공사감리(별도 rule) 적용 — 본 rule 비해당.}
  - {key: assessment_date, label: 판정기준시점, type: date, required: true}
  - {key: appointed_managers, label: 배치 책임CM기술인, type: list, required: true,
     item_fields: [person, grade, cm_experience_years, start_date, end_date]}

applicability:
  trigger_when: {all: [is_public_client, {total_contract_amount_krw__gte: 10000000000}]}  # 공공 100억↑
  note: 100억 미만 또는 민간 → not_required (민간은 건축법 공사감리로).

brackets:
  - min_krw: 50000000000      # 500억↑
    max_krw: null
    count: 1
    accepts: [{min_grade: 특급, min_cm_experience_years: 1, experience_scope: "총공사비 300억↑ 시공단계 CM"}]
  - min_krw: 30000000000      # 300~500억
    max_krw: 50000000000
    count: 1
    accepts: [{min_grade: 특급, min_cm_experience_years: 1, experience_scope: "총공사비 200억↑ 시공단계 CM"}]
  - min_krw: 10000000000      # 100~300억
    max_krw: 30000000000
    count: 1
    accepts: [{min_grade: 고급, min_cm_experience_years: 1, experience_scope: "총공사비 100억↑ 시공단계 CM"}]

evaluation:
  steps:
    - "공공 아니거나 100억 미만 → not_required."
    - "총공사비로 bracket 선택. effective 중 min_grade·min_cm_experience_years 충족자 >= count → compliant."
    - "인원 부족 → understaffed. 등급/경력 미달 → unqualified."
  outputs: [compliant, understaffed, unqualified, not_required]
  audit_significance: 책임CM 자격 미달은 건진법 위반. 감독 부실로 인한 사고 시 발주청·CM사 책임.

pending: ["별표2 상주/기술지원 건설사업관리기술인 인원 수 — 크롤링 진행중", "낙찰율 70% 미만 증원 규정 미반영"]
