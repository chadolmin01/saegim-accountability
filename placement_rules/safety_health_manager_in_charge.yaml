# Reference Rule — 안전보건관리책임자 선임 (binary)
# 검증: 산업안전보건법 시행령 별표2 (제14조). 건설업 공사금액 20억↑.
rule_id: safety_health_manager_in_charge__osha
title: 안전보건관리책임자 선임 기준
role: 안전보건관리책임자
regime: 산업안전보건법
source_type: 법령   # regime 파생 정규화 (binding 강도; 1단계 불일치탐지용)
applies_to_facility_class: 전체   # 건축/토목 게이트
requirement_shape: threshold_binary

authority:
  law: 산업안전보건법 시행령
  table: "별표 2 (안전보건관리책임자를 두어야 하는 사업의 종류·규모)"
  article: 제14조
  revision: "재확인 필요 — pending"
  source: "다수 해설 교차검증 (2026-05). 건설업 20억↑."

parameters:
  - {key: contract_amount_krw, label: 공사금액(원), type: integer, required: true}
  - {key: assessment_date, label: 판정기준시점, type: date, required: true}
  - {key: appointed_managers, label: 선임 안전보건관리책임자, type: list, required: true,
     item_fields: [person, start_date, end_date]}

# binary: 임계값 이상이면 1명 의무. 보통 현장 최고관리자(현장소장)가 겸직.
threshold:
  trigger_when: {contract_amount_krw__gte: 2000000000}   # 20억
  required_count: 1
  role_note: 현장소장 등 사업장 최고 관리자가 겸직 (전담 별도선임 불요). 안전관리자·보건관리자 지휘.

evaluation:
  steps:
    - "trigger_when 불충족 → not_required."
    - "충족 시 required=1. effective(assessment 시점 유효) >= 1 → compliant, else understaffed(미선임/공백)."
  outputs: [compliant, understaffed, not_required]
  audit_significance: 미선임은 산안법 위반. 중대재해 시 안전보건 총괄 책임 주체 부재 증거.

pending: ["별표2 원문 직접 대조"]
