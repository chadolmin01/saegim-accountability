# Condition Rule — 내구성 노출등급별 W/B 상한 (KDS 14 20 40)
# 검증: KDS 14 20 40 표4.1-3. EC(탄산화)·ES(염해) 2-vote verified(MOTIVE+MIDAS eGEN 2026-05). EF·EA partial→제외(pending).
# 차별점: 측정 W/B를 노출등급 기준값과 대조해 합부판정(예 EC2면 ≤0.50, 측정 0.48→합격).
rule_id: durability_exposure_wb__kds142040
title: 내구성 노출등급별 물-결합재비(W/B) 상한
dimension: 재료
regime: KDS 설계기준
source_type: 설계기준(KDS)   # regime 파생 정규화 (binding 강도; 1단계 불일치탐지용)
applies_to_facility_class: 전체
rule_family: condition
mode: obligation
authority:
  standard: KDS 14 20 40(콘크리트 내구성 설계) 표4.1-3
  rule: "노출등급별 W/B 상한 — 탄산화 EC1 0.60·EC2 0.55·EC3 0.50·EC4 0.45 / 염해 ES1·ES2 0.45·ES3·ES4 0.40"
  source: "KDS 14 20 40 (MOTIVE 직접추출 + MIDAS eGEN 2-vote 교차검증 2026-05)"
  pending: "동결융해 EF·황산염 EA 한도는 단일출처(partial) — 원문 대조 후 추가"
applies_to_work_kind: 콘크리트타설
applicable_when: {test_values.wb_ratio__gte: 0}
requires:
  lookup_max:
    key: test_values.wb_ratio
    by: exposure_class
    max_table: {EC1: 0.60, EC2: 0.55, EC3: 0.50, EC4: 0.45, ES1: 0.45, ES2: 0.45, ES3: 0.40, ES4: 0.40}
evaluation: {outputs: [compliant, violated, not_applicable], audit_significance: "노출등급 대비 W/B 초과 → 탄산화·염해 침투 가속·내구성 미달. KDS 14 20 40 위반. exposure_class 미설정/EF·EA는 n/a"}
