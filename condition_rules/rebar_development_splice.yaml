rule_id: rebar_development_splice__kds142052
title: 철근 정착·이음 길이 확보 (확보 ≥ 요구)
dimension: 공법
battery_ref: rd_devel
regime: KDS 설계기준
source_type: 설계기준(KDS)   # regime 파생 정규화 (binding 강도; 1단계 불일치탐지용)
applies_to_facility_class: 전체
rule_family: condition
mode: obligation
authority:
  standard: KDS 14 20 52 (정착 및 이음) / KDS 14 20 50 (철근상세)
  rule: "확보 정착·이음 길이 ≥ 요구 ld. 인장 겹침 A급 1.0ld·B급 1.3ld, 최소 300mm. 상부철근 보정 α=1.3, 에폭시 β=1.2~1.5. 표준갈고리 180°(4db·60mm↑)·90°(12db↑)"
  source: "KDS 14 20 52:2021 (sonnet 크롤 — A/B급·300mm·α·β·갈고리 verified; ld 식 계수 일부 unverified)"
applies_to_work_kind: 철근배근
applicable_when: {test_values.devel_length_provided_mm__gte: 0}
requires:
  ratio_bound: {key: test_values.devel_length_provided_mm, of: test_values.devel_length_required_mm, ratio: 1.0}
evaluation: {outputs: [compliant, violated, not_applicable], audit_significance: "정착·이음 길이 부족은 철근 인발·이음부 파괴 → 구조 직결. KDS 14 20 52 위반"}
pending: ["기본정착길이 ld 식 계수(4.1-1) KDS 원문 대조 — 확보/요구 길이는 설계산정값 입력 전제"]
