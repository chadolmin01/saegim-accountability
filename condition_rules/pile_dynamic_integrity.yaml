rule_id: pile_dynamic_integrity__ksf2591
title: 말뚝 동재하·건전도 시험 빈도 (전체 1% 이상)
dimension: 공법
battery_ref: pl_dynamic
regime: KS F 2591
source_type: KS   # regime 파생 정규화 (binding 강도; 1단계 불일치탐지용)
applies_to_facility_class: 전체
rule_family: condition
mode: obligation
authority:
  standard: 건설공사 품질관리 업무지침 별표2 / KS F 2591 (동재하 PDA) / ASTM D5882 (건전도 PIT)
  rule: "동재하시험 = 전체 말뚝 본수의 1% 이상(100본 미만 1회), 지지력 ≥설계. 건전도(PIT) 결함없음"
  source: "별표2 + KS F 2591 (sonnet 크롤 2026-05). 1% = 100본당 1회로 환산"
applies_to_work_kind: 말뚝
applicable_when: {pile_count__gte: 0}
requires:
  frequency_bound: {volume: pile_count, count: dynamic_test_count, interval_m3: 100}   # 100본당 1회 = 1%
evaluation: {outputs: [compliant, violated, not_applicable], audit_significance: "동재하 빈도 미달은 불량말뚝 미검출. 별표2 위반"}
