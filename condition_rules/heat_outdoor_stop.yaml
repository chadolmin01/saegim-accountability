rule_id: heat_outdoor_stop__osha
title: 체감온도 35℃ 무더위시간대 옥외작업 중지
dimension: 기상·근로
regime: 산업안전보건기준에 관한 규칙
source_type: 법령   # regime 파생 정규화 (binding 강도; 1단계 불일치탐지용)
