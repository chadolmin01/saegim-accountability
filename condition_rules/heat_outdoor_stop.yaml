rule_family: condition
mode: prohibition
authority: {law: 산업안전보건기준에 관한 규칙, rule: "체감온도 35℃↑ 14~17시 옥외작업 중지", revision: 2025-07-17, source: "정책브리핑 교차검증 2026-05"}
