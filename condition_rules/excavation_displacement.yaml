rule_id: excavation_displacement__kosha
title: 흙막이 수평변위 계측 관리기준
dimension: 공법
regime: KOSHA Guide
source_type: 권고(가이드)   # regime 파생 정규화 (binding 강도; 1단계 불일치탐지용)
