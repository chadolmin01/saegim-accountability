rule_family: condition
mode: obligation
authority: {law: 산업안전보건기준에 관한 규칙, article: 제313~321조(충전전로 작업·전기작업), rule: "충전전로 활선작업: 절연용 보호구·방호구 착용, 접근한계거리 유지, 활선작업용 기구 사용, 감시인 배치 중 조치", source: "산안규칙 전기작업 + 안전점검일지(활선작업 점검표) 교차검증 2026-05"}
applies_to_work_kind: 활선작업
requires:
